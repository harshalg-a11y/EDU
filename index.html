<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduSphere Central · Dashboard</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body data-page="dashboard">
  <div class="overlay" id="authOverlay">
    <div class="auth-modal">
      <h2>Welcome to EduSphere</h2>
      <p>Secure monochrome access</p>
      <div class="auth-tabs">
        <button class="auth-tab active" data-target="login" type="button">Sign In</button>
        <button class="auth-tab" data-target="register" type="button">Register</button>
      </div>
      <form id="loginForm" class="form">
        <input id="loginEmail" class="input" type="email" placeholder="Email" required />
        <input id="loginPassword" class="input" type="password" placeholder="Password" required />
        <div class="form-row"><label><input id="rememberMe" type="checkbox" /> Remember me</label></div>
        <button class="btn" type="submit">Sign In</button>
      </form>
      <form id="registerForm" class="form" style="display:none">
        <input id="registerEmail" class="input" type="email" placeholder="Email" required />
        <input id="registerPassword" class="input" type="password" placeholder="Password" required />
        <input id="registerConfirm" class="input" type="password" placeholder="Confirm password" required />
        <button class="btn" type="submit">Create Account</button>
      </form>
      <div class="msg" id="authMsg" aria-live="polite"></div>
    </div>
  </div>

  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">🎓</div>
      <nav class="nav-list">
        <a class="nav-link" data-nav="dashboard" href="/index.html">Dashboard</a>
        <a class="nav-link" data-nav="courses" href="/courses.html">Courses</a>
        <a class="nav-link" data-nav="students" href="/students.html">Students</a>
        <a class="nav-link" data-nav="scheduler" href="/scheduler.html">Scheduler</a>
        <a class="nav-link" data-nav="settings" href="/settings.html">Settings</a>
      </nav>
    </aside>

    <main class="main">
      <header class="header">
        <div>
          <div class="breadcrumb">Home / <span id="breadcrumbCurrent">Dashboard</span></div>
          <h1 class="page-title">Dashboard</h1>
        </div>
        <div class="controls"><button id="logoutBtn" class="btn" type="button">Logout</button></div>
      </header>

      <section class="content-grid">
        <article class="panel metrics" id="metricsGrid"></article>
        <div class="split">
          <article class="panel"><h3>Operational Alerts</h3><div class="list" id="alertsList"></div></article>
          <article class="panel"><h3>Top Performers</h3><div class="list"><div class="item"><strong>Rayan Hassan</strong><br><small>99.88%</small></div><div class="item"><strong>Sophia Martinez</strong><br><small>98.45%</small></div><div class="item"><strong>Emma Chen</strong><br><small>97.92%</small></div></div></article>
        </div>
      </section>

      <footer class="footer">EduSphere monochrome edition · all modules synced</footer>
    </main>
  </div>

  <script src="/app.js"></script>
</body>
</html>
